# Reusable workflow: AI-powered code review
# Usage:
#   jobs:
#     review:
#       uses: Sosoka-Labs/.github/.github/workflows/ai-code-review.yml@main
#       secrets:
#         OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
#
#   Optional inputs:
#     auto-review: true    # Review on PR open / synchronize
#     auto-improve: false # Suggest code improvements
#     auto-describe: false # Auto-generate PR description

name: AI Code Review

on:
  workflow_call:
    inputs:
      auto-review:
        description: 'Run review automatically on PR open / synchronize'
        required: false
        type: boolean
        default: true
      auto-improve:
        description: 'Suggest code improvements automatically'
        required: false
        type: boolean
        default: false
      auto-describe:
        description: 'Auto-generate PR description'
        required: false
        type: boolean
        default: false
    secrets:
      OPENAI_API_KEY:
        description: 'OpenAI API key for PR-Agent'
        required: true

jobs:
  pr_agent:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: Run PR Agent
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          github_action.auto_review: ${{ inputs.auto-review }}
          github_action.auto_improve: ${{ inputs.auto-improve }}
          github_action.auto_describe: ${{ inputs.auto-describe }}
